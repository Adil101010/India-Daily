<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>India Daily</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ------------- HEADER + TOP BAR + NAV ------------- -->
  <div include-html="/header/header.html"></div>

  <main>

    <!-- 3 COLUMNS: TRENDING / LATEST / EDITORIALS -->
    <section class="three-columns container" aria-label="Top news sections">
      <div class="col">
        <h2 class="col-title">TRENDING</h2>
        <div class="col-list" id="trendingList"></div>
      </div>

      <div class="col">
        <h2 class="col-title">LATEST NEWS</h2>
        <div class="col-list" id="latestList"></div>
      </div>

      <div class="col">
        <h2 class="col-title">EDITORIALS</h2>
        <div class="col-list" id="editorialList"></div>
      </div>
    </section>

    <!-- FEED + SIDEBAR -->
    <section id="infiniteFeedSection" class="infinite-feed container" aria-label="Latest stories">
      <header class="feed-header">
        <h2 class="feed-title">Latest Stories</h2>

        <div id="feedControls" class="feed-controls" aria-label="Filter stories by date range">
          <span class="feed-controls-label">Show:</span>
          <button class="feed-filter active" type="button" data-period="all">All</button>
          <button class="feed-filter" type="button" data-period="1">1 day</button>
          <button class="feed-filter" type="button" data-period="10">10 days</button>
          <button class="feed-filter" type="button" data-period="30">1 month</button>
        </div>
      </header>

      <div class="feed-layout">
        <!-- MAIN FEED -->
        <div class="feed-main">
          <div id="feedList" class="feed-list" aria-live="polite"></div>
          <div id="feedLoader" class="feed-loader">Loading...</div>
          <div id="feedSentinel" class="feed-sentinel" aria-hidden="true"></div>
        </div>

        <!-- SIDEBAR -->
        <aside id="infiniteFeedSidebar" class="infinite-feed-sidebar" aria-label="Latest videos">
          <h3 class="sidebar-title">Videos</h3>
          <div class="yt-list">
            <article class="yt-item lazy-yt" data-video-id="VIDEO1" aria-label="Video 1">
              <div class="yt-thumb">Loading...</div>
            </article>
            <article class="yt-item lazy-yt" data-video-id="VIDEO2" aria-label="Video 2">
              <div class="yt-thumb">Loading...</div>
            </article>
            <article class="yt-item lazy-yt" data-video-id="VIDEO3" aria-label="Video 3">
              <div class="yt-thumb">Loading...</div>
            </article>
          </div>
        </aside>
      </div>
    </section>

    <!-- RELATED HOME SECTION -->
    <section id="relatedHomeSection" class="related-home-section container" aria-label="Related posts">
      <h2 class="related-home-title">संबंधित पोस्ट</h2>
      <div id="relatedHomeGrid" class="related-home-grid"></div>
      <div class="related-home-more">
        <button id="relatedShowMore" class="btn-outline" type="button">और पढ़ें</button>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <script>
    // Load footer partial
    fetch("./footer/footer.html")
      .then(res => res.text())
      .then(data => {
        const footerEl = document.getElementById("footer");
        if (footerEl) {
          footerEl.innerHTML = data;
        }
      })
      .catch(err => {
        console.error("Error loading footer:", err);
      });
  </script>

  <!-- JS -->
  <script type="module" src="js/main.js"></script>
  <!-- Include header partials -->
  <script src="/include.js"></script>
</body>
</html>
